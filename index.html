const getUsers=()=>[
  {id:"owner1",label:"Owner",pin:localStorage.getItem("pin_owner")||"3860",role:"owner"},
  {id:"staff1",label:"কেরানি",pin:localStorage.getItem("pin_staff")||"6969",role:"staff"},
];

const todayStr=()=>new Date().toISOString().split("T")[0];
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split("T")[0];};
const fmtDate=(d)=>{if(!d)return"—";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const fmtDateShort=(d)=>{if(!d)return"—";const[y,m,day]=d.split("-");const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return`${day} ${months[parseInt(m)-1]}`;};
const tk=(n)=>`BDT ${Number(n||0).toFixed(2)}`;
let _id=Date.now();
const uid=()=>(++_id).toString(36);
const newProduct=()=>({id:uid(),name:"",qty:"",unitPrice:"",cost:"",manualTotal:""});
const productTotal=(p)=>p.manualTotal!==""?parseFloat(p.manualTotal)||0:(parseFloat(p.qty)||0)*(parseFloat(p.unitPrice)||0);
const orderRevenue=(products=[])=>products.reduce((s,p)=>s+productTotal(p),0);
const orderCost=(products=[])=>products.reduce((s,p)=>s+(parseFloat(p.cost)||0)*(parseFloat(p.qty)||1),0);
const hasCost=(products=[])=>products.some(p=>parseFloat(p.cost)>0);
const orderSaveFromDC=(deliveryCharge=0,actualDC="")=>{
  const billed=parseFloat(deliveryCharge)||0;
  const actual=actualDC!==""?parseFloat(actualDC)||0:0;
  return billed-actual;
};
const orderProfit=(products=[],deliveryCharge=0,deliveryPaid=false,actualDC="")=>{
  const rev=orderRevenue(products);
  const cost=hasCost(products)?orderCost(products):0;
  return rev+orderSaveFromDC(deliveryCharge,actualDC)-cost;
};
let nextSeq=1;
const makeOrder=()=>({
  id:uid(),seq:nextSeq++,clientName:"",phone:"",address:"",
  orderDate:todayStr(),deliveryDate:"",printDate:"",printDaysBefore:"",
  status:"Talking",products:[newProduct()],notes:"",
  deliveryCharge:"",actualDC:"",deliveryPaid:false,paymentMethod:"COD",
  expanded:false,
  invoiceNum:`PL${String(nextSeq-1).padStart(5,"0")}`,
});

const getFS=()=>window.__firestore;
const saveOrderToFS=async(order)=>{
  const fs=getFS();
  const {expanded,...toSave}=order;
  await fs.setDoc(fs.doc("orders",order.id),toSave);
};
const deleteOrderFromFS=async(id)=>{
  const fs=getFS();
  await fs.deleteDoc(fs.doc("orders",id));
};

const saveExpenseToFS=async(row)=>{
  const fs=getFS();
  await fs.setDoc(fs.doc("expenses",row.id),row);
};
const deleteExpenseFromFS=async(id)=>{
  const fs=getFS();
  await fs.deleteDoc(fs.doc("expenses",id));
};

// ─── EXPENSE TRACKER ─────────────────────────────────────────────────────────
function ExpenseTracker({canEdit}){
  const[rows,setRows]=React.useState([]);
  const[loaded,setLoaded]=React.useState(false);

  // Live-sync from Firestore
  React.useEffect(()=>{
    if(!window.__firebaseReady)return;
    const fs=getFS();
    const unsub=fs.onSnapshot(fs.collection("expenses"),(snap)=>{
      const docs=snap.docs.map(d=>d.data());
      docs.sort((a,b)=>(a.sortKey||a.id)<(b.sortKey||b.id)?-1:1);
      setRows(docs);setLoaded(true);
    });
    return()=>unsub();
  },[]);

  const addRow=async()=>{
    const id=uid();
    const row={id,sortKey:Date.now().toString(),date:"",purpose:"",costing:"",total:"",inHandBefore:"",inHandAfter:"",isMonthEnd:false};
    await saveExpenseToFS(row);
  };

  const updateRow=async(id,field,value)=>{
    setRows(prev=>prev.map(r=>r.id===id?{...r,[field]:value}:r));
    const row=rows.find(r=>r.id===id);
    if(row)await saveExpenseToFS({...row,[field]:value});
  };

  const deleteRow=async(id)=>{
    setRows(prev=>prev.filter(r=>r.id!==id));
    await deleteExpenseFromFS(id);
  };

  const toggleMonthEnd=async(id)=>{
    const row=rows.find(r=>r.id===id);
    if(row)await saveExpenseToFS({...row,isMonthEnd:!row.isMonthEnd});
  };

  // Styles matching the spreadsheet color theme
  const headerCell={
    padding:"9px 10px",fontWeight:"bold",fontSize:12,letterSpacing:0.5,
    textAlign:"center",border:"1px solid #1a1a1a",whiteSpace:"nowrap"
  };
  const cellStyle=(bg,color,align="left")=>({
    padding:"7px 8px",fontSize:12,background:bg,color,border:"1px solid #1a1a1a",
    textAlign:align,verticalAlign:"middle"
  });
  const editInput=(bg,color)=>({
    background:bg,color,border:"none",outline:"none",width:"100%",
    fontSize:12,fontFamily:"inherit",padding:"2px 4px",
    fontWeight:"inherit",textAlign:"inherit"
  });

  const isStaff=!canEdit;

  return(
    <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:10,padding:"16px",marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:"bold",fontSize:15,color:"#fff",letterSpacing:0.5}}>
          💸 Expense Tracker
        </div>
        {canEdit&&(
          <button onClick={addRow} style={{...bS("#cc0000","#fff",12),padding:"6px 14px"}}>+ Add Row</button>
        )}
      </div>
      {!loaded&&<div style={{color:"#555",fontSize:12,textAlign:"center",padding:20}}>Loading expenses…</div>}
      {loaded&&(
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",minWidth:820,width:"100%"}}>
            <thead>
              <tr>
                <th style={{...headerCell,background:"#cc0000",color:"#fff",width:90}}>Date</th>
                <th style={{...headerCell,background:"#cc0000",color:"#fff",minWidth:180}}>Purpose</th>
                <th style={{...headerCell,background:"#cc0000",color:"#fff",minWidth:140}}>Costing</th>
                <th style={{...headerCell,background:"#00bcd4",color:"#000",width:80}}>Total</th>
                <th style={{...headerCell,background:"#3b7dd8",color:"#fff",minWidth:160}}>In Hand Cash (Before)</th>
                <th style={{...headerCell,background:"#6ec6f5",color:"#000",minWidth:160}}>In Hand Cash (After)</th>
                {canEdit&&<th style={{...headerCell,background:"#1a1a1a",color:"#555",width:60}}>⚙</th>}
              </tr>
            </thead>
            <tbody>
              {rows.length===0&&(
                <tr><td colSpan={canEdit?7:6} style={{textAlign:"center",color:"#444",padding:20,fontSize:13}}>No expenses yet. {canEdit?"Click \"+ Add Row\" to start.":""}</td></tr>
              )}
              {rows.map(r=>{
                if(r.isMonthEnd){
                  return(
                    <tr key={r.id}>
                      <td colSpan={canEdit?6:6} style={{background:"#cc0000",color:"#fff",fontWeight:"bold",fontSize:12,textAlign:"center",padding:"7px 10px",letterSpacing:1,border:"1px solid #1a1a1a"}}>
                        Month Closed
                        {canEdit&&<button onClick={()=>toggleMonthEnd(r.id)} title="Convert to normal row" style={{marginLeft:10,background:"rgba(0,0,0,0.3)",border:"none",color:"#ffaaaa",cursor:"pointer",fontSize:10,borderRadius:3,padding:"1px 6px"}}>↩ undo</button>}
                      </td>
                      {canEdit&&<td style={{...cellStyle("#1a1a1a","#555"),textAlign:"center"}}>
                        <button onClick={()=>deleteRow(r.id)} style={{background:"none",border:"none",color:"#550000",cursor:"pointer",fontSize:14}} title="Delete">✕</button>
                      </td>}
                    </tr>
                  );
                }
                // Compute total from costing expression if numeric
                const computedTotal=(()=>{
                  if(r.total&&r.total.trim())return null; // user overrode
                  try{
                    const expr=r.costing.replace(/[^0-9+\-*/.()\s]/g,"");
                    const v=expr?Function("return "+expr)():0;
                    return isNaN(v)?null:v;
                  }catch{return null;}
                })();
                const displayTotal=r.total||(computedTotal!=null?computedTotal.toString():"");
                const dateBg="#ffff80"; // yellow
                const purpBg="#ffff80";
                const costBg="#ffff80";
                const totBg="#00bcd4";
                const beforeBg="#3b7dd8";
                const afterBg="#6ec6f5";
                return(
                  <tr key={r.id}>
                    <td style={cellStyle(dateBg,"#111")}>
                      {canEdit
                        ?<input value={r.date} onChange={e=>updateRow(r.id,"date",e.target.value)}
                            placeholder="D/M/YYYY" style={{...editInput(dateBg,"#111"),textAlign:"center"}}/>
                        :<span style={{fontWeight:"bold"}}>{r.date||"—"}</span>}
                    </td>
                    <td style={cellStyle(purpBg,"#111")}>
                      {canEdit
                        ?<input value={r.purpose} onChange={e=>updateRow(r.id,"purpose",e.target.value)}
                            placeholder="e.g. Print + Anti cutter" style={editInput(purpBg,"#111")}/>
                        :<span style={{fontWeight:"bold"}}>{r.purpose||"—"}</span>}
                    </td>
                    <td style={cellStyle(costBg,"#111")}>
                      {canEdit
                        ?<input value={r.costing} onChange={e=>updateRow(r.id,"costing",e.target.value)}
                            placeholder="e.g. 1120+70" style={editInput(costBg,"#111")}/>
                        :<span>{r.costing||"—"}</span>}
                    </td>
                    <td style={{...cellStyle(totBg,"#000"),"fontWeight":"bold",textAlign:"center"}}>
                      {canEdit
                        ?<input value={r.total} onChange={e=>updateRow(r.id,"total",e.target.value)}
                            placeholder={computedTotal!=null?computedTotal.toString():""}
                            style={{...editInput(totBg,"#000"),textAlign:"center",fontWeight:"bold"}}/>
                        :<span style={{fontWeight:"bold"}}>{displayTotal||"—"}</span>}
                    </td>
                    <td style={cellStyle(beforeBg,"#fff")}>
                      {canEdit
                        ?<input value={r.inHandBefore} onChange={e=>updateRow(r.id,"inHandBefore",e.target.value)}
                            placeholder="e.g. 1900 Eric + 220 Bkash" style={editInput(beforeBg,"#fff")}/>
                        :<span>{r.inHandBefore||"—"}</span>}
                    </td>
                    <td style={cellStyle(afterBg,"#000")}>
                      {canEdit
                        ?<input value={r.inHandAfter} onChange={e=>updateRow(r.id,"inHandAfter",e.target.value)}
                            placeholder="e.g. 1500 + 220 Bkash" style={editInput(afterBg,"#000")}/>
                        :<span>{r.inHandAfter||"—"}</span>}
                    </td>
                    {canEdit&&(
                      <td style={{...cellStyle("#1a1a1a","#555"),textAlign:"center"}}>
                        <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                          <button onClick={()=>toggleMonthEnd(r.id)} title="Mark as Month End" style={{background:"none",border:"none",color:"#cc0000",cursor:"pointer",fontSize:13}}>⚑</button>
                          <button onClick={()=>deleteRow(r.id)} title="Delete row" style={{background:"none",border:"none",color:"#550000",cursor:"pointer",fontSize:14}}>✕</button>
                        </div>
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
          {canEdit&&<div style={{fontSize:11,color:"#444",marginTop:8}}>Tip: ⚑ marks a "Month Closed" separator. Costing auto-computes Total (e.g. "1120+70" → 1190).</div>}
        </div>
      )}
    </div>
  );
}

// ─── OWNER LOGIN ──────────────────────────────────────────────────────────────
function RetroLoginScreen({onLogin}){
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[shake,setShake]=useState(false);
  const attempt=useCallback(()=>{
    const found=getUsers().find(u=>u.pin===pin);
    if(found){onLogin(found);}
    else{setShake(true);setErr("WRONG PIN. TRY AGAIN.");setPin("");setTimeout(()=>setShake(false),600);}
  },[pin,onLogin]);
  useEffect(()=>{
    const h=(e)=>{
      if(e.key>="0"&&e.key<="9")setPin(p=>p.length<4?p+e.key:p);
      else if(e.key==="Backspace")setPin(p=>p.slice(0,-1));
      else if(e.key==="Enter")attempt();
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[attempt]);
  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",padding:20}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px)",zIndex:9999}}/>
      <div className="flicker" style={{width:"100%",maxWidth:420}}>
        <div style={{border:"2px solid #cc0000",borderRadius:4,background:"#0d0d0d",boxShadow:"0 0 40px rgba(204,0,0,0.4),inset 0 0 40px rgba(0,0,0,0.8)",overflow:"hidden"}}>
          <div style={{background:"#cc0000",padding:"6px 14px",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:"#ff6666"}}/>
            <div style={{width:12,height:12,borderRadius:"50%",background:"#ffaa00"}}/>
            <div style={{width:12,height:12,borderRadius:"50%",background:"#44cc44"}}/>
            <span style={{marginLeft:8,fontSize:11,color:"#fff",fontWeight:"bold",letterSpacing:2}}>POSTER_LAGAI_TERMINAL v1.0</span>
          </div>
          <div style={{padding:"32px 28px 28px"}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <img src={LOGO_URL} alt="Poster Lagai Logo" style={{width:180,height:180,objectFit:"contain",filter:"drop-shadow(0 0 20px #cc0000)",borderRadius:16,background:"transparent"}}/>
            </div>
            <div className="glow-text" style={{color:"#cc0000",fontSize:22,fontWeight:"bold",textAlign:"center",marginBottom:6,letterSpacing:2}}>HEY CHIEF!</div>
            <div style={{color:"#ff6666",fontSize:15,textAlign:"center",marginBottom:28,letterSpacing:1}}>LOGIN PLEASE<span className="blink">_</span></div>
            <div style={{color:"#44cc44",fontSize:12,marginBottom:8,letterSpacing:1}}>&gt; ENTER ACCESS CODE:</div>
            <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:20}}>
              {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",border:"2px solid #cc0000",background:pin.length>i?"#cc0000":"transparent",boxShadow:pin.length>i?"0 0 10px #cc0000":"none",transition:"all 0.15s"}}/>)}
            </div>
            <div style={{animation:shake?"shake 0.5s ease":"none"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
                {[1,2,3,4,5,6,7,8,9].map(n=>(
                  <button key={n} className="pin-btn" onClick={()=>setPin(p=>p.length<4?p+n:p)}
                    style={{background:"#1a1a1a",color:"#cc0000",border:"1px solid #330000",borderRadius:4,padding:"14px 0",fontSize:18,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>{n}</button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <button className="pin-btn" onClick={()=>setPin(p=>p.slice(0,-1))} style={{background:"#1a1a1a",color:"#ff6666",border:"1px solid #330000",borderRadius:4,padding:"14px 0",fontSize:14,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>⌫</button>
                <button className="pin-btn" onClick={()=>setPin(p=>p.length<4?p+"0":p)} style={{background:"#1a1a1a",color:"#cc0000",border:"1px solid #330000",borderRadius:4,padding:"14px 0",fontSize:18,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>0</button>
                <button className="pin-btn" onClick={attempt} style={{background:"#1a0000",color:"#ff4444",border:"1px solid #cc0000",borderRadius:4,padding:"14px 0",fontSize:14,fontWeight:"bold",cursor:"pointer",transition:"all 0.1s"}}>↵</button>
              </div>
            </div>
            {err&&<div style={{color:"#ff4444",fontSize:12,textAlign:"center",marginTop:14,letterSpacing:2}}>⚠ {err}</div>}
            <div style={{marginTop:24,borderTop:"1px solid #1a1a1a",paddingTop:14,color:"#333",fontSize:11,textAlign:"center",letterSpacing:1}}>AUTHORIZED PERSONNEL ONLY · POSTER LAGAI SYSTEMS</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── STAFF P&L VIEW (read-only, no invoice print) ────────────────────────────
function StaffPnlView({data,from,to,onFromChange,onToChange,orders,onToggleDelivery,onUpdate}){
  const setPreset=(preset)=>{
    const t=todayStr(),[y,m]=t.split("-");
    if(preset==="thisMonth"){onFromChange(`${y}-${m}-01`);onToChange(t);}
    else if(preset==="lastMonth"){
      const d=new Date(t);d.setDate(1);d.setMonth(d.getMonth()-1);
      const ly=d.getFullYear(),lm=String(d.getMonth()+1).padStart(2,"0"),lastDay=new Date(ly,d.getMonth()+1,0).getDate();
      onFromChange(`${ly}-${lm}-01`);onToChange(`${ly}-${lm}-${lastDay}`);
    }else if(preset==="thisYear"){onFromChange(`${y}-01-01`);onToChange(t);}
    else if(preset==="allTime"){onFromChange("2000-01-01");onToChange("2099-12-31");}
  };
  return(
    <div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px 16px",marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <label style={{fontWeight:"bold",color:"#aaa",fontSize:13}}>From:</label>
          <div style={{position:"relative"}}><input type="text" readOnly value={from?from.split("-").reverse().join("/"):""} style={{...iS({width:130}),cursor:"pointer"}}/><input type="date" value={from} onChange={e=>onFromChange(e.target.value)} style={{position:"absolute",inset:0,opacity:0,width:"100%",cursor:"pointer"}}/></div>
          <label style={{fontWeight:"bold",color:"#aaa",fontSize:13}}>To:</label>
          <div style={{position:"relative"}}><input type="text" readOnly value={to?to.split("-").reverse().join("/"):""} style={{...iS({width:130}),cursor:"pointer"}}/><input type="date" value={to} onChange={e=>onToChange(e.target.value)} style={{position:"absolute",inset:0,opacity:0,width:"100%",cursor:"pointer"}}/></div>
          <span style={{color:"#664444",fontSize:12}}>Delivered orders only</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["thisMonth","This Month"],["lastMonth","Last Month"],["thisYear","This Year"],["allTime","All Time"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPreset(k)} style={bS("#1a1a1a","#888",11,"#333")}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:22}}>
        <SCard label="Revenue"     value={tk(data.revenue)}   color="#4488ff"/>
        <SCard label="Total Cost"  value={tk(data.totalCost)} color="#ff6666"/>
        <SCard label="Profit"      value={tk(data.profit)}    color={data.profit>=0?"#44cc44":"#cc4444"}/>
        <SCard label="Courier Cost" value={tk(data.delivery)}  color="#aaa"/>
        <SCard label="Save from DC" value={tk(data.saveFromDC)} color={data.saveFromDC>=0?"#44cc44":"#cc4444"}/>
      </div>
      {orders.filter(o=>o.status==="Delivered").length===0
        ?<div style={{textAlign:"center",color:"#554444",marginTop:40}}>No delivered orders yet.</div>
        :<MonthlyFolders orders={orders.filter(o=>o.status==="Delivered")} onPrintOrder={null}/>}
    </div>
  );
}

// ─── STAFF DASHBOARD ─────────────────────────────────────────────────────────
function StaffDashboard({orders,user,onUpdateDeliveryPaid,onUpdate,onLock,pnlData,pnlFrom,pnlTo,onPnlFromChange,onPnlToChange}){
  const[filter,setFilter]=useState("All");
  const[filterUnpaidDC,setFilterUnpaidDC]=useState(false);
  const[search,setSearch]=useState("");
  const[expandedId,setExpandedId]=useState(null);
  const[staffTab,setStaffTab]=useState("orders"); // "orders" | "expenses" | "pnl" | "months"
  const today=todayStr();

  const printToday=orders.filter(o=>o.printDate===today&&o.status==="Confirmed");

  const visible=orders.filter(o=>{
    const ms=filter==="All"||o.status===filter;
    const mq=!search||
      o.clientName.toLowerCase().includes(search.toLowerCase())||
      (o.phone||"").includes(search)||
      o.products.some(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    const mu=!filterUnpaidDC||(parseFloat(o.deliveryCharge)>0&&!o.deliveryPaid);

      <div style={{position:"fixed",inset:0,pointerEvents:"none",background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px)",zIndex:9998}}/>

          <StaffOrderCard key={o.id} order={o} expanded={expandedId===o.id}

        {staffTab==="expenses"&&(

      {/* Footer */}
      <div style={{textAlign:"center",padding:"20px",fontSize:10,color:"#2a1a1a",letterSpacing:1,borderTop:"1px solid #1a1a1a",marginTop:20}}>
        POSTER LAGAI SYSTEMS · OPERATIONS · {new Date().getFullYear()}
      </div>
    </div>
  );
}


// ─── STAFF MONTHLY FOLDERS ───────────────────────────────────────────────────
function StaffMonthlyFolders({orders,onToggleDelivery,onUpdate}){
  const[expandedId,setExpandedId]=React.useState(null);
  const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];

  const grouped=React.useMemo(()=>{
    const map={};
    orders.forEach(o=>{
      const d=o.deliveryDate||o.orderDate;
      if(!d)return;
      const key=d.slice(0,7);
      if(!map[key])map[key]=[];
      map[key].push(o);
    });
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[orders]);

  const monthLabel=(key)=>{
    const[y,m]=key.split("-");
    return`${MONTH_NAMES[parseInt(m)-1]} ${y}`;
  };

  if(grouped.length===0)return(
    <div style={{textAlign:"center",color:"#444",marginTop:60,fontSize:15}}>No orders yet.</div>
  );

  return(
    <div>
      {grouped.map(([key,ords])=>{
        const sorted=ords.slice().sort((a,b)=>(b.seq||0)-(a.seq||0));
        return(
          <div key={key}>
            <div style={{background:"#cc0000",color:"#fff",padding:"8px 20px",fontWeight:"bold",fontSize:13,marginBottom:2,marginTop:10}}>
              📅 {monthLabel(key)} — {ords.length} orders
            </div>
            {sorted.map(o=>(
              <StaffOrderCard key={o.id} order={o} expanded={expandedId===o.id}
                onToggle={()=>setExpandedId(expandedId===o.id?null:o.id)}
                onToggleDelivery={()=>onToggleDelivery(o.id,!o.deliveryPaid)}
                onUpdate={onUpdate}/>
            ))}
          </div>
        );
      })}
    </div>
  );
}

function StaffOrderCard({order:o,expanded,onToggle,onToggleDelivery,onUpdate}){
  const sc=STATUS_COLOR[o.status];
  const isLate=o.deliveryDate&&o.deliveryDate<todayStr()&&o.status!=="Delivered";
  const printSoon=o.printDate&&o.printDate<=addDays(todayStr(),1)&&o.status==="Confirmed";
  const rev=orderRevenue(o.products),dc=parseFloat(o.deliveryCharge)||0;
  const grandTotal=o.deliveryPaid?rev:rev+dc;
  return(
    <div style={{background:"#111",border:`1px solid ${isLate?"#cc0000":"#222"}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",flexWrap:"wrap"}} onClick={onToggle}>
        <div style={{flex:1,minWidth:160}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:"bold",fontSize:15,color:"#fff"}}>#{o.seq} — {o.clientName||"Unnamed"}</span>
            {o.phone&&<span style={{color:"#555",fontSize:12}}>📞 {o.phone}</span>}
            {isLate&&<span style={{color:"#cc0000",fontSize:11,fontWeight:"bold"}}>⚠ LATE</span>}
            {printSoon&&<span style={{color:"#ffaa00",fontSize:11,fontWeight:"bold"}}>🖨 PRINT SOON</span>}
          </div>
          <div style={{fontSize:12,color:"#555",marginTop:3}}>{o.products.filter(p=>p.name).map(p=>`${p.name}${p.qty?` ×${p.qty}`:""}`).join(", ")||"No products"}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:"bold"}}>{o.status}</span>
          <span style={{background:"#1a1a1a",border:"1px solid #333",color:"#aaa",borderRadius:20,padding:"3px 10px",fontSize:11}}>{o.paymentMethod||"COD"}</span>
          {dc>0&&<span style={{background:o.deliveryPaid?"#0a2a0a":"#2a0a0a",color:o.deliveryPaid?"#44cc44":"#cc4444",border:`1px solid ${o.deliveryPaid?"#005500":"#550000"}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:"bold"}}>🚚 {tk(dc)} {o.deliveryPaid?"Paid":"Unpaid"}</span>}
          <span style={{color:"#fff",fontSize:13,fontWeight:"bold"}}>Total: {tk(grandTotal)}</span>
          {o.deliveryDate&&<span style={{color:"#555",fontSize:12}}>Del: {fmtDate(o.deliveryDate)}</span>}
        </div>
      </div>
      {expanded&&(
        <div style={{borderTop:"1px solid #1e1e1e",padding:"12px 14px",background:"#0d0d0d"}}>
          <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:12,fontSize:13,color:"#888"}}>
            <Info label="Order Date" value={fmtDate(o.orderDate)}/>
            {o.printDate&&<Info label="Print Date" value={fmtDate(o.printDate)}/>}
            {o.address&&<Info label="Address" value={o.address}/>}
            {o.invoiceNum&&<Info label="Invoice #" value={o.invoiceNum}/>}
          </div>
          {dc>0&&(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 12px",borderRadius:8,background:"#1a1a1a",border:`1px solid ${o.deliveryPaid?"#005500":"#550000"}`}}>
              <span style={{color:"#aaa",fontSize:13}}>🚚 Delivery: <strong style={{color:"#fff"}}>{tk(dc)}</strong></span>
              <span style={{marginLeft:"auto",fontWeight:"bold",color:o.deliveryPaid?"#44cc44":"#cc4444"}}>{o.deliveryPaid?"✅ Paid":"❌ Unpaid"}</span>
              <button onClick={e=>{e.stopPropagation();onToggleDelivery();}}
                style={{background:o.deliveryPaid?"rgba(80,0,0,0.3)":"rgba(0,80,30,0.3)",color:o.deliveryPaid?"#cc4444":"#44cc66",border:`1px solid ${o.deliveryPaid?"#550000":"#005520"}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:11,fontWeight:"bold",letterSpacing:1}}>
                MARK {o.deliveryPaid?"UNPAID":"PAID"}
              </button>
            </div>
          )}
          <div style={{overflowX:"auto",marginBottom:12}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#cc0000",color:"#fff"}}>{["Item","Qty","Rate","Amount"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:h==="Item"?"left":"right"}}>{h}</th>)}</tr></thead>
              <tbody>{o.products.map((p,i)=>(
                <tr key={p.id} style={{background:i%2===0?"#111":"#161616",borderBottom:"1px solid #1e1e1e"}}>
                  <td style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>{p.name||"—"}</td>
                  <td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{p.qty||"—"}</td>
                  <td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{p.unitPrice?tk(parseFloat(p.unitPrice)):"—"}</td>
                  <td style={{padding:"7px 12px",color:"#fff",textAlign:"right",fontWeight:"bold"}}>{tk(productTotal(p))}</td>
                </tr>
              ))}</tbody>
              <tfoot>
                {dc>0&&!o.deliveryPaid&&<tr style={{background:"#1a1a1a"}}><td colSpan={3} style={{padding:"7px 12px",color:"#888",fontStyle:"italic"}}>Delivery Fees</td><td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{tk(dc)}</td></tr>}
                <tr style={{background:"#cc0000"}}><td colSpan={3} style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>Total</td><td style={{padding:"7px 12px",color:"#fff",textAlign:"right",fontWeight:"bold"}}>{tk(grandTotal)}</td></tr>
              </tfoot>
            </table>
          </div>
          {o.notes&&<div style={{fontSize:13,color:"#888",marginBottom:10,background:"#1a1a00",padding:"7px 10px",borderRadius:6,border:"1px solid #333300"}}>📝 {o.notes}</div>}
          <SteadfastButton order={o} grandTotal={grandTotal} onUpdate={onUpdate}/>
        </div>
      )}
    </div>
  );
}


// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const[orders,setOrders]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[fbReady,setFbReady]=useState(!!window.__firebaseReady);
  const[view,setView]=useState("orders");
  const[filterStatus,setFilterStatus]=useState("All");
  const[filterUnpaidDC,setFilterUnpaidDC]=useState(false);
  const[search,setSearch]=useState("");
  const[showForm,setShowForm]=useState(false);
  const[draft,setDraft]=useState(null);
  const[pnlFrom,setPnlFrom]=useState(todayStr().slice(0,7)+"-01");
  const[pnlTo,setPnlTo]=useState(todayStr());
  const[user,setUser]=useState(null);
  const[printOrder,setPrintOrder]=useState(null);
  const[confirmDelete,setConfirmDelete]=useState(null);

  // ── BACK BUTTON SUPPORT ──
  const pushNav=(state)=>{window.history.pushState(state,"","");};
  const goOrders=()=>{setShowForm(false);setDraft(null);setPrintOrder(null);setView("orders");};

  // When navigating to a "sub-screen", push a history entry so back returns home
  const navToForm=useCallback((d)=>{setDraft(d);setShowForm(true);pushNav({screen:"form"});},[]);
  const navToPrint=useCallback((o)=>{setPrintOrder(o);pushNav({screen:"print"});},[]);
  const navToView=useCallback((v)=>{setView(v);pushNav({screen:"view",v});},[]);

  // Push history when a status filter is applied so back can clear it
  const navToFilter=useCallback((status)=>{
    if(status==="All"){
      setFilterStatus("All");
      window.history.back();
    } else {
      setFilterStatus(status);
      pushNav({screen:"filter",status});
    }
  },[]);

  useEffect(()=>{
    const onPop=(e)=>{
      const s=e.state;
      // No state or base = browser will exit naturally, do nothing
      if(!s||s.screen==="base"){return;}
      if(s.screen==="orders"){
        // Buffer entry: user pressed back from All Orders once, stays here (next back exits)
        goOrders();
      } else if(s.screen==="filter"){
        // Back from a filtered view → clear filter, re-push the orders buffer so back twice exits
        setFilterStatus("All");
        pushNav({screen:"orders"});
      } else {
        // Back from form / print / expenses / pnl → go to All Orders and re-push buffer
        goOrders();
        pushNav({screen:"orders"});
      }
    };
    window.addEventListener("popstate",onPop);
    // Seed two history entries on first load: base (exit point) + buffer so back once stays in All Orders
    if(!window.history.state){window.history.replaceState({screen:"base"},"","");window.history.pushState({screen:"orders"},"","");}
    return()=>window.removeEventListener("popstate",onPop);
  },[]);

  useEffect(()=>{
    if(window.__firebaseReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebaseReady",h);
    return()=>window.removeEventListener("firebaseReady",h);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const fs=getFS();
    const unsub=fs.onSnapshot(fs.collection("orders"),(snapshot)=>{
      const docs=snapshot.docs.map(d=>({expanded:false,...d.data()}));
      docs.sort((a,b)=>(a.seq||0)-(b.seq||0));
      const maxSeq=docs.reduce((m,o)=>Math.max(m,o.seq||0),0);
      nextSeq=maxSeq+1;
      setOrders(docs);
      setLoaded(true);
    },(err)=>{
      console.error("Firestore error:",err);
      setLoaded(true);
    });
    return()=>unsub();
  },[fbReady]);

  const updateOrder=async(id,patch)=>{
    const isUIOnly=Object.keys(patch).length===1&&"expanded"in patch;
    setOrders(prev=>prev.map(o=>{
      if(o.id!==id)return o;
      const updated={...o,...patch};
      if(!isUIOnly)saveOrderToFS(updated);
      return updated;
    }));
  };

  const advanceStatus=(id)=>{
    const o=orders.find(x=>x.id===id);
    const idx=STATUS_FLOW.indexOf(o.status);
    if(idx<STATUS_FLOW.length-1)updateOrder(id,{status:STATUS_FLOW[idx+1]});
  };

  const deleteOrder=async(id)=>{
    setOrders(prev=>prev.filter(o=>o.id!==id));
    await deleteOrderFromFS(id);
  };

  const saveOrder=async()=>{
    if(!draft.clientName.trim())return alert("Client name is required.");
    const days=parseInt(draft.printDaysBefore);
    const pd=draft.deliveryDate&&!isNaN(days)?addDays(draft.deliveryDate,-days):draft.printDate||"";
    const saved={...draft,printDate:pd};
    await saveOrderToFS(saved);
    setDraft(null);setShowForm(false);
  };

  const pnlData=useMemo(()=>{
    const mo=orders.filter(o=>{
      if(o.status!=="Delivered")return false;
      const d=o.deliveryDate||o.orderDate;
      return d>=pnlFrom&&d<=pnlTo;
    });
    const revenue=mo.reduce((s,o)=>s+orderRevenue(o.products),0);
    const delivery=mo.reduce((s,o)=>s+(o.actualDC!==""?parseFloat(o.actualDC)||0:parseFloat(o.deliveryCharge)||0),0);
    const totalCost=mo.reduce((s,o)=>s+orderCost(o.products),0);
    const profit=mo.reduce((s,o)=>s+orderProfit(o.products,o.deliveryCharge,o.deliveryPaid,o.actualDC),0);
    const saveFromDC=mo.reduce((s,o)=>s+orderSaveFromDC(o.deliveryCharge,o.actualDC),0);
    return{orders:mo,revenue,delivery,totalCost,profit,saveFromDC};
  },[orders,pnlFrom,pnlTo]);

  const visible=orders.filter(o=>{
    const ms=filterStatus==="All"||o.status===filterStatus;
    const mq=!search||o.clientName.toLowerCase().includes(search.toLowerCase())||o.products.some(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    const mu=!filterUnpaidDC||(parseFloat(o.deliveryCharge)>0&&!o.deliveryPaid);
    return ms&&mq&&mu;
  }).slice().sort((a,b)=>{
    if(filterStatus==="Delivered"){
      const ai=parseInt((a.invoiceNum||"").replace(/\D/g,""))||0;
      const bi=parseInt((b.invoiceNum||"").replace(/\D/g,""))||0;
      return bi-ai;
    }
    return (b.seq||0)-(a.seq||0);
  });

  const printDueToday=orders.filter(o=>o.printDate===todayStr()&&o.status==="Confirmed");

  if(!fbReady||!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d0d0d",color:"#fff",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid #cc0000",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"#cc0000",fontFamily:"'Courier New',monospace",letterSpacing:2,fontSize:13}}>CONNECTING TO FIREBASE...</div>
    </div>
  );

  if(!user)return<RetroLoginScreen onLogin={setUser}/>;

  // ── STAFF VIEW ──
  if(user.role==="staff"){
    return(
      <StaffDashboard
        orders={orders}
        user={user}
        onUpdateDeliveryPaid={(id,paid)=>updateOrder(id,{deliveryPaid:paid})}
        onUpdate={updateOrder}
        onLock={()=>setUser(null)}
        pnlData={pnlData}
        pnlFrom={pnlFrom}
        pnlTo={pnlTo}
        onPnlFromChange={setPnlFrom}
        onPnlToChange={setPnlTo}
      />
    );
  }

  // ── OWNER VIEW ──
  if(printOrder)return<InvoicePrint order={printOrder} onClose={()=>window.history.back()} onSave={async(u)=>{await updateOrder(u.id,u);setPrintOrder({...printOrder,...u});}}/>;

  return(
    <div style={{fontFamily:"Georgia,serif",background:"#0d0d0d",minHeight:"100vh",color:"#eee"}}>
      <div style={{background:"#111",borderBottom:"2px solid #cc0000",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={LOGO_URL} alt="PL Logo" style={{width:36,height:36,borderRadius:8,border:"1px solid #cc0000",boxShadow:"0 0 8px rgba(204,0,0,0.4)",objectFit:"contain",background:"#000"}}/>
          <div>
            <div style={{fontSize:20,fontWeight:"bold",color:"#fff",letterSpacing:1}}>Poster Lagai</div>
            <div style={{fontSize:11,color:"#666",marginTop:1}}>Order Management System</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#44cc44",boxShadow:"0 0 6px #44cc44"}}/>
          <span style={{fontSize:11,color:"#44cc44"}}>Firebase Live</span>
          <NavBtn label="📦 Orders"   active={view==="orders"}   onClick={()=>navToView("orders")}/>
          <NavBtn label="💸 Expenses" active={view==="expenses"} onClick={()=>navToView("expenses")}/>
          <NavBtn label="📊 P&L"      active={view==="pnl"}      onClick={()=>navToView("pnl")}/>
          <NavBtn label="⚙ Dev" active={view==="dev"} onClick={()=>navToView("dev")}/>
          <span style={{fontSize:12,background:"#1a1a1a",border:"1px solid #cc0000",padding:"4px 10px",borderRadius:20,color:"#cc0000"}}>{user.label} ✓</span>
          <button onClick={()=>setUser(null)} style={bS("#1a1a1a","#aaa",11,"#444")}>Lock</button>
        </div>
      </div>

      {printDueToday.length>0&&(
        <div style={{background:"#cc0000",color:"#fff",padding:"8px 20px",fontWeight:"bold",fontSize:13}}>
          🖨️ PRINT TODAY: {printDueToday.map(o=>o.clientName).join(" · ")}
        </div>
      )}

      <div style={{padding:"18px 14px",maxWidth:980,margin:"0 auto"}}>
        {view==="orders"&&(
          <>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="Search client or product…" value={search} onChange={e=>setSearch(e.target.value)} style={iS({flex:1,minWidth:150})}/>
              <button onClick={()=>navToForm(makeOrder())} style={bS("#cc0000","#fff")}>+ New Order</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              {STATUS_FLOW.map(s=>{
                const active=filterStatus===s;
                return(
                  <div key={s} onClick={()=>navToFilter(active?"All":s)} style={{background:active?STATUS_COLOR[s].bg:"#1a1a1a",border:`1px solid ${active?STATUS_COLOR[s].border:"#333"}`,color:active?STATUS_COLOR[s].text:"#555",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:"bold",cursor:"pointer",transition:"all 0.15s",userSelect:"none"}}>
                    {s}: {orders.filter(o=>o.status===s).length}
                  </div>
                );
              })}
              {filterStatus!=="All"&&<div onClick={()=>navToFilter("All")} style={{background:"#1a1a1a",border:"1px solid #333",color:"#666",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",userSelect:"none"}}>✕ All</div>}
              <div onClick={()=>setFilterUnpaidDC(f=>!f)} style={{background:filterUnpaidDC?"#2a0a0a":"#1a1a1a",border:`1px solid ${filterUnpaidDC?"#cc4444":"#333"}`,color:filterUnpaidDC?"#ff4444":"#555",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:"bold",cursor:"pointer",transition:"all 0.15s",userSelect:"none",marginLeft:"auto"}}>
                🚚 Unpaid DC: {orders.filter(o=>parseFloat(o.deliveryCharge)>0&&!o.deliveryPaid).length}
              </div>
            </div>
            {visible.length===0&&<div style={{textAlign:"center",color:"#444",marginTop:60,fontSize:15}}>No orders yet. Add one above!</div>}
            {visible.map(o=>(
              <OrderCard key={o.id} order={o} onUpdate={updateOrder} onAdvance={advanceStatus}
                onEdit={()=>navToForm({...o,products:o.products.map(p=>({...p}))})}
                onPrint={()=>navToPrint(o)} onDeleteRequest={id=>setConfirmDelete(id)}/>
            ))}
          </>
        )}
        {view==="expenses"&&<ExpenseTracker canEdit={true}/>}
        {view==="pnl"&&<PnlView data={pnlData} allOrders={orders.filter(o=>o.status==="Delivered")} from={pnlFrom} to={pnlTo} onFromChange={setPnlFrom} onToChange={setPnlTo} onPrintOrder={(o)=>navToPrint(o)}/>}
        {view==="dev"&&<DevView/>}
      </div>

      {showForm&&draft&&(
        <Modal onClose={()=>{window.history.back();}}>
          <OrderForm draft={draft} setDraft={setDraft} onSave={saveOrder} onCancel={()=>window.history.back()}/>
        </Modal>
      )}

      {confirmDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000}}>
          <div style={{background:"#1a1a1a",border:"1px solid #cc0000",borderRadius:14,padding:28,width:300,textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:10}}>🗑️</div>
            <div style={{fontWeight:"bold",fontSize:16,marginBottom:8,color:"#fff"}}>Delete this order?</div>
            <div style={{color:"#888",fontSize:13,marginBottom:20}}>This cannot be undone.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)} style={{...bS("#222","#aaa",13,"#444"),flex:1,padding:"10px 0"}}>Cancel</button>
              <button onClick={()=>{deleteOrder(confirmDelete);setConfirmDelete(null);}} style={{...bS("#cc0000","#fff"),flex:1,padding:"10px 0"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ORDER CARD (Owner view) ───────────────────────────────────────────────────
function OrderCard({order:o,onUpdate,onAdvance,onEdit,onPrint,onDeleteRequest}){
  const sc=STATUS_COLOR[o.status];
  const isLate=o.deliveryDate&&o.deliveryDate<todayStr()&&o.status!=="Delivered";
  const printSoon=o.printDate&&o.printDate<=addDays(todayStr(),1)&&o.status==="Confirmed";
  const rev=orderRevenue(o.products),dc=parseFloat(o.deliveryCharge)||0;
  const grandTotal=o.deliveryPaid?rev:rev+dc;
  return(
    <div style={{background:"#111",border:`1px solid ${isLate?"#cc0000":"#222"}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",flexWrap:"wrap"}} onClick={()=>onUpdate(o.id,{expanded:!o.expanded})}>
        <div style={{flex:1,minWidth:160}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontWeight:"bold",fontSize:15,color:"#fff"}}>#{o.seq} — {o.clientName||"Unnamed"}</span>
            {o.phone&&<span style={{color:"#555",fontSize:12}}>📞 {o.phone}</span>}
            {isLate&&<span style={{color:"#cc0000",fontSize:11,fontWeight:"bold"}}>⚠ LATE</span>}
            {printSoon&&<span style={{color:"#ffaa00",fontSize:11,fontWeight:"bold"}}>🖨 PRINT SOON</span>}
          </div>
          <div style={{fontSize:12,color:"#555",marginTop:3}}>{o.products.filter(p=>p.name).map(p=>`${p.name}${p.qty?` ×${p.qty}`:""}`).join(", ")||"No products"}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:"bold"}}>{o.status}</span>
          <span style={{background:"#1a1a1a",border:"1px solid #333",color:"#aaa",borderRadius:20,padding:"3px 10px",fontSize:11}}>{o.paymentMethod||"COD"}</span>
          {dc>0&&<span style={{background:o.deliveryPaid?"#0a2a0a":"#2a0a0a",color:o.deliveryPaid?"#44cc44":"#cc4444",border:`1px solid ${o.deliveryPaid?"#005500":"#550000"}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:"bold"}}>🚚 {tk(dc)} {o.deliveryPaid?"Paid":"Unpaid"}</span>}
          <span style={{color:"#fff",fontSize:13,fontWeight:"bold"}}>Total: {tk(grandTotal)}</span>
          {o.deliveryDate&&<span style={{color:"#555",fontSize:12}}>Del: {fmtDate(o.deliveryDate)}</span>}
        </div>
      </div>
      {o.expanded&&(
        <div style={{borderTop:"1px solid #1e1e1e",padding:"12px 14px",background:"#0d0d0d"}}>
          <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:12,fontSize:13,color:"#888"}}>
            <Info label="Order Date" value={fmtDate(o.orderDate)}/>
            {o.printDate&&<Info label="Print Date" value={fmtDate(o.printDate)}/>}
            {o.address&&<Info label="Address" value={o.address}/>}
            {o.invoiceNum&&<Info label="Invoice #" value={o.invoiceNum}/>}
            {(()=>{const profit=orderProfit(o.products,o.deliveryCharge,o.deliveryPaid,o.actualDC);return<Info label="Profit" value={tk(profit)}/>;})()}
          </div>
          {dc>0&&(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 12px",borderRadius:8,background:"#1a1a1a",border:`1px solid ${o.deliveryPaid?"#005500":"#550000"}`}}>
              <span style={{color:"#aaa",fontSize:13}}>🚚 Delivery: <strong style={{color:"#fff"}}>{tk(dc)}</strong></span>
              <span style={{marginLeft:"auto",fontWeight:"bold",color:o.deliveryPaid?"#44cc44":"#cc4444"}}>{o.deliveryPaid?"✅ Paid":"❌ Unpaid"}</span>
              <button onClick={()=>onUpdate(o.id,{deliveryPaid:!o.deliveryPaid})} style={bS(o.deliveryPaid?"#550000":"#005500","#fff",11)}>Mark {o.deliveryPaid?"Unpaid":"Paid"}</button>
            </div>
          )}
          <div style={{overflowX:"auto",marginBottom:12}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#cc0000",color:"#fff"}}>{["Item","Qty","Rate","Amount"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:h==="Item"?"left":"right"}}>{h}</th>)}</tr></thead>
              <tbody>{o.products.map((p,i)=>(
                <tr key={p.id} style={{background:i%2===0?"#111":"#161616",borderBottom:"1px solid #1e1e1e"}}>
                  <td style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>{p.name||"—"}</td>
                  <td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{p.qty||"—"}</td>
                  <td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{p.unitPrice?tk(parseFloat(p.unitPrice)):"—"}</td>
                  <td style={{padding:"7px 12px",color:"#fff",textAlign:"right",fontWeight:"bold"}}>{tk(productTotal(p))}</td>
                </tr>
              ))}</tbody>
              <tfoot>
                {dc>0&&!o.deliveryPaid&&<tr style={{background:"#1a1a1a"}}><td colSpan={3} style={{padding:"7px 12px",color:"#888",fontStyle:"italic"}}>Delivery Fees</td><td style={{padding:"7px 12px",color:"#aaa",textAlign:"right"}}>{tk(dc)}</td></tr>}
                <tr style={{background:"#cc0000"}}><td colSpan={3} style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>Total</td><td style={{padding:"7px 12px",color:"#fff",textAlign:"right",fontWeight:"bold"}}>{tk(grandTotal)}</td></tr>
              </tfoot>
            </table>
          </div>
          {o.notes&&<div style={{fontSize:13,color:"#888",marginBottom:10,background:"#1a1a00",padding:"7px 10px",borderRadius:6,border:"1px solid #333300"}}>📝 {o.notes}</div>}
          <SteadfastButton order={o} grandTotal={grandTotal} onUpdate={onUpdate}/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={onPrint} style={bS("#1a1a1a","#fff",12,"#cc0000")}>🖨️ Invoice</button>
            <button onClick={onEdit} style={bS("#1a1a1a","#fff",12,"#333")}>✏️ Edit</button>
            {o.status!=="Delivered"&&<button onClick={()=>onAdvance(o.id)} style={bS("#003300","#44cc44",12,"#005500")}>→ {STATUS_FLOW[STATUS_FLOW.indexOf(o.status)+1]}</button>}
            <button onClick={()=>onDeleteRequest(o.id)} style={bS("#1a0000","#cc4444",12,"#550000")}>🗑 Delete</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── COPY FIELD HELPER ────────────────────────────────────────────────────────
function CopyField({label,value,link}){
  const[copied,setCopied]=React.useState(false);
  const copy=()=>{navigator.clipboard.writeText(value).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});};
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
      <span style={{color:"#888"}}>{label}:</span>
      {link
        ?<a href={link} target="_blank" rel="noopener noreferrer" style={{color:"#fff",fontWeight:"bold",letterSpacing:0.5,textDecoration:"underline",textUnderlineOffset:2}}>{value}</a>
        :<strong style={{color:"#fff",letterSpacing:0.5}}>{value}</strong>
      }
      <button onClick={copy} title={copied?"Copied!":"Copy"} style={{background:"none",border:"none",cursor:"pointer",padding:"1px 3px",display:"inline-flex",alignItems:"center",color:copied?"#44cc44":"#aaa",transition:"color 0.2s"}}>
        {copied
          ?<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,7 5.5,11 12,3" stroke="#44cc44" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          :<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="1" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.4"/>
            <rect x="1" y="4" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.4" fill="#0d0d0d"/>
          </svg>
        }
      </button>
    </span>
  );
}

// ── STEADFAST COURIER ─────────────────────────────────────────────────────────
// Direct API calls are blocked by browser CORS. Requests go through a
// Cloudflare Worker proxy. Set your deployed worker URL below after setup.
const SF_PROXY_URL = localStorage.getItem("sf_proxy_url") || "";

function SteadfastButton({order:o,grandTotal,onUpdate}){
  // Always derive booked state from the order prop so it survives collapse/expand
  const isBooked=!!(o.steadfastConsignment&&(o.steadfastConsignment.trackingCode||o.steadfastConsignment.parcelId));
  const[status,setStatus]=useState(isBooked?"ok":null); // null | "loading" | "ok" | "err" | "setup"
  const[errMsg,setErrMsg]=useState("");
  const[proxyUrl,setProxyUrl]=useState(SF_PROXY_URL);
  const[inputUrl,setInputUrl]=useState(SF_PROXY_URL);
  const[consignment,setConsignment]=useState(o.steadfastConsignment||null); // {trackingCode, parcelId}

  // Sync with prop changes (e.g. Firestore update arrives after booking)
  useEffect(()=>{
    if(o.steadfastConsignment&&(o.steadfastConsignment.trackingCode||o.steadfastConsignment.parcelId)){
      setConsignment(o.steadfastConsignment);
      setStatus("ok");
    }
  },[o.steadfastConsignment]);

  const saveProxy=()=>{
    const url=inputUrl.trim().replace(/\/$/,"");
    localStorage.setItem("sf_proxy_url",url);
    setProxyUrl(url);
    setStatus(null);
  };

  const send=async()=>{
    if(!proxyUrl){setStatus("setup");return;}
    if(!o.clientName||!o.phone||!o.address){
      setStatus("err");setErrMsg("Order needs name, phone & address first.");return;
    }
    setStatus("loading");setErrMsg("");
    try{
      const res=await fetch(proxyUrl,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          endpoint:"create_order",
          invoice:o.invoiceNum||`PL${String(o.seq).padStart(5,"0")}`,
          recipient_name:o.clientName,
          recipient_phone:o.phone,
          recipient_address:o.address,
          cod_amount:Math.round(grandTotal),
          note:o.notes||"",
          weight:0.5,
        }),
      });
      const data=await res.json();
      // Steadfast success: { status: 200, consignment: { consignment_id, tracking_code } }
      const c=data.consignment||null;
      const trackingCode=(c&&c.tracking_code)||"";
      const parcelId=(c&&(c.consignment_id||c.id))||"";
      // public_link is returned by status_by_cid and merged in by the Worker
      const publicLink=(c&&(c.public_link||c.tracking_link||c.public_tracking_link||c.link))||"";
      const isRealSuccess=data.status===200&&c&&(trackingCode||parcelId);
      if(isRealSuccess){
        const info={trackingCode,parcelId,publicLink,bookedAt:new Date().toISOString()};
        setConsignment(info);
        setStatus("ok");
        // Persist to Firestore so it survives refresh
        if(onUpdate)onUpdate(o.id,{steadfastConsignment:info});
      }else{
        // Show full raw Steadfast response so we know exactly what went wrong
        const errDetail=data.message||(data.errors&&JSON.stringify(data.errors))||JSON.stringify(data)||"HTTP "+res.status;
        setStatus("err");
        setErrMsg("Steadfast said: "+errDetail);
      }
    }catch(e){
      setStatus("err");setErrMsg("Network error: "+e.message);
    }
  };

  const[unbookConfirm,setUnbookConfirm]=useState(false);
  const[sendConfirm,setSendConfirm]=useState(false);
  const unbook=()=>{
    setConsignment(null);setStatus(null);setErrMsg("");setUnbookConfirm(false);
    if(onUpdate)onUpdate(o.id,{steadfastConsignment:null});
  };

  if(status==="setup"||(!proxyUrl&&status!=="ok")){
    return(
      <div style={{background:"#111",border:"1px solid #330000",borderRadius:8,padding:"10px 12px",marginBottom:8,fontSize:12}}>
        <div style={{color:"#cc0000",fontWeight:"bold",marginBottom:6}}>⚙️ One-time Steadfast Setup</div>
        <div style={{color:"#aaa",marginBottom:8,lineHeight:1.5}}>
          Browsers block direct API calls (CORS). You need a free Cloudflare Worker proxy.<br/>
          <b style={{color:"#fff"}}>Steps:</b><br/>
          1. Go to <a href="https://workers.cloudflare.com" target="_blank" style={{color:"#55aaff"}}>workers.cloudflare.com</a> → sign up free<br/>
          2. Create a new Worker → paste the code from <b style={{color:"#fff"}}>steadfast-worker.js</b><br/>
          3. Deploy → copy the <b style={{color:"#fff"}}>*.workers.dev</b> URL → paste below
        </div>
        <div style={{display:"flex",gap:6}}>
          <input value={inputUrl} onChange={e=>setInputUrl(e.target.value)}
            placeholder="https://your-worker.workers.dev"
            style={{flex:1,background:"#0d0d0d",border:"1px solid #330000",borderRadius:4,padding:"5px 8px",color:"#eee",fontSize:12,outline:"none"}}/>
          <button onClick={saveProxy} style={bS("#330000","#cc0000",12,"#550000")}>Save</button>
          {proxyUrl&&<button onClick={()=>setStatus(null)} style={bS("#1a1a1a","#666",12,"#333")}>Cancel</button>}
        </div>
      </div>
    );
  }

  return(
    <div style={{marginBottom:8}}>
      {status==="ok"&&consignment
        ?<div style={{background:"#0a2a0a",border:"1px solid #005500",borderRadius:6,padding:"8px 12px",fontSize:12,color:"#44cc44",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span>✅ Booked on Steadfast</span>
          {consignment.parcelId&&<CopyField label="Parcel ID" value={String(consignment.parcelId)}/>}
          {consignment.trackingCode&&<CopyField label="Tracking" value={consignment.trackingCode} link={consignment.publicLink||`https://steadfast.com.bd/tl/${consignment.trackingCode}`}/>}
          {!unbookConfirm
            ?<button onClick={()=>setUnbookConfirm(true)} title="Unbook" style={{marginLeft:"auto",...bS("#1a0000","#cc4444",11,"#330000"),padding:"3px 8px"}}>✕ Unbook</button>
            :<div style={{marginLeft:"auto",display:"flex",flexDirection:"column",gap:6,background:"#1a0000",border:"1px solid #550000",borderRadius:6,padding:"8px 10px",maxWidth:260}}>
              <div style={{color:"#ff6666",fontSize:11,fontWeight:"bold"}}>⚠ This only removes it here.</div>
              <div style={{color:"#aaa",fontSize:11}}>You must also cancel it manually on <a href="https://portal.steadfast.com.bd" target="_blank" rel="noopener noreferrer" style={{color:"#55aaff"}}>Steadfast portal</a> — there is no cancel API.</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setUnbookConfirm(false)} style={{...bS("#1a1a1a","#888",11,"#333"),flex:1}}>Cancel</button>
                <button onClick={unbook} style={{...bS("#cc0000","#fff",11),flex:1}}>Remove anyway</button>
              </div>
            </div>
          }
        </div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {!sendConfirm
            ?<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>setSendConfirm(true)} disabled={status==="loading"} style={{...bS("#1a0000","#cc0000",12,"#330000"),opacity:status==="loading"?0.6:1,cursor:status==="loading"?"wait":"pointer"}}>
                {status==="loading"?"⏳ Sending…":"🚚 Send to Steadfast"}
              </button>
              <button onClick={()=>{setStatus("setup");setInputUrl(proxyUrl);}} title="Change worker URL" style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:14,padding:"2px 4px"}}>⚙</button>
              {status==="err"&&<span style={{fontSize:11,color:"#ff6666"}}>⚠ {errMsg}</span>}
            </div>
            :<div style={{background:"#1a0a00",border:"1px solid #553300",borderRadius:6,padding:"10px 12px",fontSize:12}}>
              <div style={{color:"#ffaa44",fontWeight:"bold",marginBottom:4}}>🚚 Confirm Send to Steadfast?</div>
              <div style={{color:"#aaa",marginBottom:10}}>This will create a consignment on Steadfast for <strong style={{color:"#fff"}}>{o.clientName}</strong> with COD amount <strong style={{color:"#fff"}}>{tk(grandTotal)}</strong>. This cannot be undone via API.</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setSendConfirm(false)} style={{...bS("#1a1a1a","#888",12,"#333"),flex:1}}>Cancel</button>
                <button onClick={()=>{setSendConfirm(false);send();}} style={{...bS("#cc0000","#fff",12),flex:1}}>Yes, Send</button>
              </div>
            </div>
          }
        </div>
      }
    </div>
  );
}

// ── LOGO DROP ZONE ────────────────────────────────────────────────────────────
function LogoDropZone({logo,setLogo}){
  const[drag,setDrag]=useState(false);
  const load=(file)=>{if(!file||!file.type.startsWith("image/"))return;const r=new FileReader();r.onload=e=>setLogo(e.target.result);r.readAsDataURL(file);};
  return(
    <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);load(e.dataTransfer.files[0]);}}
      style={{border:`2px dashed ${drag?"#cc0000":"#333"}`,borderRadius:10,padding:logo?"6px":"14px 10px",textAlign:"center",cursor:"pointer",background:drag?"#1a0000":"#111",transition:"all 0.2s",minWidth:90,position:"relative"}}
      onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>load(e.target.files[0]);i.click();}}>
      {logo
        ?<><img src={logo} alt="Logo" style={{maxWidth:160,maxHeight:90,objectFit:"contain",display:"block"}}/>
           <button onClick={e=>{e.stopPropagation();setLogo(null);}} style={{position:"absolute",top:2,right:4,background:"none",border:"none",color:"#cc0000",cursor:"pointer",fontSize:16}}>✕</button></>
        :<div style={{color:"#444",fontSize:11}}>🖼 Drop logo<br/>or click</div>}
    </div>
  );
}

  );

function InlineEdit({value,onChange,style={},placeholder="",type="text",prefix=""}){
  const[editing,setEditing]=useState(false);
  const[v,setV]=useState(value);
  useEffect(()=>{setV(value);},[value]);
  if(editing)return(
    <input autoFocus type={type} value={v} onChange={e=>setV(e.target.value)}
      onBlur={()=>{onChange(v);setEditing(false);}}
      onKeyDown={e=>{if(e.key==="Enter"){onChange(v);setEditing(false);}}}
      style={{background:"#1a1a1a",border:"1px solid #cc0000",borderRadius:4,padding:"2px 6px",color:"#fff",fontSize:style.fontSize||13,width:style.width||"auto",minWidth:60,outline:"none",textAlign:style.textAlign||"left"}}/>
  );
  return(
    <span onClick={()=>setEditing(true)} title="Click to edit" style={{cursor:"text",borderBottom:"1px dashed #333",display:style.display||"inline-block",...style}}>
      {prefix}{value||<span style={{color:"#444",fontStyle:"italic"}}>{placeholder}</span>}
    </span>
  );
}
