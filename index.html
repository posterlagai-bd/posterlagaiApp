      </div>
    </div>
  );
}

// ── P&L ───────────────────────────────────────────────────────────────────────
function PnlView({data,allOrders,from,to,onFromChange,onToChange,onPrintOrder}){
  const setPreset=(preset)=>{
    const t=todayStr(),[y,m]=t.split("-");
    if(preset==="thisMonth"){onFromChange(`${y}-${m}-01`);onToChange(t);}
    else if(preset==="lastMonth"){
      const d=new Date(t);d.setDate(1);d.setMonth(d.getMonth()-1);
      const ly=d.getFullYear(),lm=String(d.getMonth()+1).padStart(2,"0"),lastDay=new Date(ly,d.getMonth()+1,0).getDate();
      onFromChange(`${ly}-${lm}-01`);onToChange(`${ly}-${lm}-${lastDay}`);
    }else if(preset==="thisYear"){onFromChange(`${y}-01-01`);onToChange(t);}
    else if(preset==="allTime"){onFromChange("2000-01-01");onToChange("2099-12-31");}
  };
  return(
    <div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px 16px",marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <label style={{fontWeight:"bold",color:"#aaa",fontSize:13}}>From:</label>
          <div style={{position:"relative"}}><input type="text" readOnly value={from?from.split("-").reverse().join("/"):""} style={{...iS({width:130}),cursor:"pointer"}}/><input type="date" value={from} onChange={e=>onFromChange(e.target.value)} style={{position:"absolute",inset:0,opacity:0,width:"100%",cursor:"pointer"}}/></div>
          <label style={{fontWeight:"bold",color:"#aaa",fontSize:13}}>To:</label>
          <div style={{position:"relative"}}><input type="text" readOnly value={to?to.split("-").reverse().join("/"):""} style={{...iS({width:130}),cursor:"pointer"}}/><input type="date" value={to} onChange={e=>onToChange(e.target.value)} style={{position:"absolute",inset:0,opacity:0,width:"100%",cursor:"pointer"}}/></div>
          <span style={{color:"#664444",fontSize:12}}>Delivered orders only</span>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["thisMonth","This Month"],["lastMonth","Last Month"],["thisYear","This Year"],["allTime","All Time"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPreset(k)} style={bS("#1a1a1a","#888",11,"#333")}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:22}}>
        <SCard label="Revenue"     value={tk(data.revenue)}   color="#4488ff"/>
        <SCard label="Total Cost"  value={tk(data.totalCost)} color="#ff6666"/>
        <SCard label="Profit"      value={tk(data.profit)}    color={data.profit>=0?"#44cc44":"#cc4444"}/>
        <SCard label="Courier Cost" value={tk(data.delivery)}  color="#aaa"/>
        <SCard label="Save from DC" value={tk(data.saveFromDC)} color={data.saveFromDC>=0?"#44cc44":"#cc4444"}/>
      </div>
      {allOrders.length===0
        ?<div style={{textAlign:"center",color:"#554444",marginTop:40}}>No delivered orders for this period.</div>
        :<MonthlyFolders orders={allOrders} onPrintOrder={onPrintOrder}/>}
    </div>
  );
}

function MonthlyFolders({orders,onPrintOrder}){
  const[openMonths,setOpenMonths]=React.useState({});
  const toggleMonth=(key)=>setOpenMonths(prev=>({...prev,[key]:!prev[key]}));
  const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];

  // Group orders by year-month
  const grouped=React.useMemo(()=>{
    const map={};
    orders.forEach(o=>{
      const d=o.deliveryDate||o.orderDate;
      if(!d)return;
      const key=d.slice(0,7); // "2026-05"
      if(!map[key])map[key]=[];
      map[key].push(o);
    });
    // Sort months descending
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[orders]);

  const monthLabel=(key)=>{
    const[y,m]=key.split("-");
    return`${MONTH_NAMES[parseInt(m)-1]} ${y}`;
  };

  const monthStats=(ords)=>{
    const revenue=ords.reduce((s,o)=>s+orderRevenue(o.products),0);
    const profit=ords.reduce((s,o)=>s+orderProfit(o.products,o.deliveryCharge,o.deliveryPaid,o.actualDC),0);
    const courierCost=ords.reduce((s,o)=>s+(o.actualDC!==""?parseFloat(o.actualDC)||0:parseFloat(o.deliveryCharge)||0),0);
    const saveFromDC=ords.reduce((s,o)=>s+orderSaveFromDC(o.deliveryCharge,o.actualDC),0);
    return{revenue,profit,courierCost,saveFromDC};
  };

  const downloadMonthPDF=(key,ords)=>{
    const label=monthLabel(key);
    const stats=monthStats(ords);
    const sorted=ords.slice().sort((a,b)=>{
      const ai=parseInt((a.invoiceNum||"").replace(/\D/g,""))||0;
      const bi=parseInt((b.invoiceNum||"").replace(/\D/g,""))||0;
      return ai-bi;
    });

    const logoUrl=LOGO_URL;
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <style>
      body{font-family:Georgia,serif;background:#fff;color:#111;padding:32px;max-width:750px;margin:auto;}
      .header{display:flex;align-items:center;gap:16px;margin-bottom:8px;}
      .logo{width:52px;height:52px;}
      .biz{font-size:22px;font-weight:bold;color:#cc0000;letter-spacing:1px;}
      .sub{font-size:12px;color:#888;letter-spacing:2px;}
      .month-title{font-size:18px;font-weight:bold;margin:18px 0 12px;border-bottom:2px solid #cc0000;padding-bottom:6px;color:#cc0000;}
      .summary{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
      .scard{border:1px solid #ddd;border-radius:8px;padding:10px 16px;flex:1;min-width:120px;text-align:center;}
      .scard-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
      .scard-val{font-size:16px;font-weight:bold;}
      table{width:100%;border-collapse:collapse;font-size:13px;}
      th{background:#cc0000;color:#fff;padding:8px 10px;text-align:left;}
      th:last-child{text-align:right;}
      td{padding:7px 10px;border-bottom:1px solid #eee;}
      td:last-child{text-align:right;font-weight:bold;}
      tr:nth-child(even){background:#f9f9f9;}
      .footer{margin-top:24px;font-size:10px;color:#aaa;text-align:center;letter-spacing:1px;}
    </style></head><body>
    <div class="header">
      <img class="logo" src="${logoUrl}"/>
      <div><div class="biz">Poster Lagai</div><div class="sub">ORDER MANAGEMENT SYSTEM · DHAKA</div></div>
    </div>
    <div class="month-title">📅 ${label} — Monthly Report</div>
    <div class="summary">
      <div class="scard"><div class="scard-label">Revenue</div><div class="scard-val" style="color:#2255cc">BDT ${stats.revenue.toFixed(2)}</div></div>
      <div class="scard"><div class="scard-label">Courier Cost</div><div class="scard-val" style="color:#888">BDT ${stats.courierCost.toFixed(2)}</div></div>
      <div class="scard"><div class="scard-label">Profit</div><div class="scard-val" style="color:${stats.profit>=0?"#22aa44":"#cc2222"}">BDT ${stats.profit.toFixed(2)}</div></div>
      <div class="scard"><div class="scard-label">Save from DC</div><div class="scard-val" style="color:${stats.saveFromDC>=0?"#22aa44":"#cc2222"}">BDT ${stats.saveFromDC.toFixed(2)}</div></div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Client</th><th>Items</th><th>Total</th></tr></thead>
      <tbody>
        ${sorted.map(o=>{
          const grand=o.deliveryPaid?orderRevenue(o.products):orderRevenue(o.products)+(parseFloat(o.deliveryCharge)||0);
          const items=o.products.filter(p=>p.name).map(p=>`${p.name}${p.qty?` ×${p.qty}`:""}`).join(", ")||"—";
          return`<tr><td>#${o.seq}</td><td>${o.clientName||"—"}</td><td>${items}</td><td>BDT ${grand.toFixed(2)}</td></tr>`;
        }).join("")}
      </tbody>
    </table>
    <div class="footer">Poster Lagai · ${label} · Generated ${new Date().toLocaleDateString("en-GB")} · Total Orders: ${sorted.length}</div>
    </body></html>`;

    const win=window.open("","_blank");
    win.document.write(html);
    win.document.close();
    setTimeout(()=>win.print(),600);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {/* Tile row — all month cards side by side */}
      <div style={{display:"flex",flexWrap:"wrap",gap:16,alignItems:"flex-start",marginBottom:8}}>
        {grouped.map(([key,ords])=>{
          const isOpen=!!openMonths[key];
          const stats=monthStats(ords);
          return(
            <div key={key} style={{borderRadius:10,overflow:"hidden",border:`1px solid ${isOpen?"#cc0000":"#2a2a2a"}`,display:"flex",flexDirection:"column",width:"calc(20% - 13px)",minWidth:200,boxSizing:"border-box",transition:"border-color 0.2s"}}>
              {/* Red top bar */}
              <div onClick={()=>toggleMonth(key)} style={{background:isOpen?"#aa0000":"#cc0000",padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:"bold",fontSize:14,color:"#fff",letterSpacing:0.5}}>📅 {monthLabel(key)}</span>
                <span style={{background:"rgba(0,0,0,0.25)",color:"#ffcccc",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:"bold"}}>{ords.length} orders</span>
              </div>
              {/* Black body with stats */}
              <div style={{background:"#0d0d0d",padding:"14px 16px",flex:1,display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,whiteSpace:"nowrap"}}>Revenue</span>
                  <span style={{fontWeight:"bold",color:"#4488ff",fontSize:13,whiteSpace:"nowrap"}}>{tk(stats.revenue)}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,whiteSpace:"nowrap"}}>Courier</span>
                  <span style={{fontWeight:"bold",color:"#aaa",fontSize:13,whiteSpace:"nowrap"}}>{tk(stats.courierCost)}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,whiteSpace:"nowrap"}}>Profit</span>
                  <span style={{fontWeight:"bold",color:stats.profit>=0?"#44cc44":"#cc4444",fontSize:13,whiteSpace:"nowrap"}}>{tk(stats.profit)}</span>
                </div>
                <div style={{borderTop:"1px solid #1e1e1e",paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1,whiteSpace:"nowrap"}}>Save from DC</span>
                  <span style={{fontWeight:"bold",color:stats.saveFromDC>=0?"#44cc44":"#cc4444",fontSize:15,whiteSpace:"nowrap"}}>{tk(stats.saveFromDC)}</span>
                </div>
              </div>
              {/* Dark bottom bar */}
              <div style={{background:"#1a1a1a",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid #2a2a2a"}}>
                <span onClick={()=>toggleMonth(key)} style={{color:isOpen?"#cc0000":"#555",fontSize:12,cursor:"pointer",userSelect:"none",fontWeight:isOpen?"bold":"normal"}}>{isOpen?"▲ Hide orders":"▼ View orders"}</span>
                <button onClick={e=>{e.stopPropagation();downloadMonthPDF(key,ords);}} style={{...bS("#cc0000","#fff",11),padding:"5px 12px"}}>⬇ PDF</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Expanded orders — rendered full-width below all tiles */}
      {grouped.map(([key,ords])=>{
        if(!openMonths[key])return null;
        const sorted=ords.slice().sort((a,b)=>{
          const ai=parseInt((a.invoiceNum||"").replace(/\D/g,""))||0;
          const bi=parseInt((b.invoiceNum||"").replace(/\D/g,""))||0;
          return bi-ai;
        });
        return(
          <div key={key+"_open"} style={{width:"100%",background:"#0d0d0d",border:"1px solid #cc0000",borderRadius:10,marginBottom:16,overflow:"hidden"}}>
            {/* Section header */}
            <div style={{background:"#1a0000",borderBottom:"1px solid #330000",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontWeight:"bold",color:"#cc0000",fontSize:14,letterSpacing:0.5}}>📅 {monthLabel(key)} — {ords.length} orders</span>
              <span onClick={()=>toggleMonth(key)} style={{color:"#555",fontSize:12,cursor:"pointer",userSelect:"none"}}>▲ Collapse</span>
            </div>
            <div style={{padding:"12px 14px"}}>
              {sorted.map(o=>{
                const rev=orderRevenue(o.products),dc=parseFloat(o.deliveryCharge)||0,grand=o.deliveryPaid?rev:rev+dc;
                const cost=orderCost(o.products),profit=orderProfit(o.products,o.deliveryCharge,o.deliveryPaid,o.actualDC);
                return(
                  <div key={o.id} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
                    <div style={{background:"#1a1a1a",padding:"8px 14px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                      <span style={{fontWeight:"bold",color:"#fff"}}>#{o.seq} {o.clientName}</span>
                      <div style={{display:"flex",gap:10,alignItems:"center",fontSize:12,flexWrap:"wrap"}}>
                        <span style={{color:"#666"}}>{o.paymentMethod}</span>
                        {cost>0&&<span style={{color:"#aaa"}}>Cost: {tk(cost)}</span>}
                        <span style={{color:profit>=0?"#44cc44":"#cc4444"}}>Profit: {tk(profit)}</span>
                        {dc>0&&<span style={{color:o.deliveryPaid?"#44cc44":"#cc4444"}}>🚚 {tk(dc)} {o.deliveryPaid?"Paid":"Unpaid"}</span>}
                        <span style={{color:"#cc0000",fontWeight:"bold"}}>Total: {tk(grand)}</span>
                        {onPrintOrder&&<button onClick={()=>onPrintOrder(o)} style={bS("#1a1a1a","#fff",11,"#333")}>🖨️ Invoice</button>}
                      </div>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                        <thead><tr style={{background:"#0d0d0d"}}>{["Item","Qty","Rate","Amount"].map(h=><th key={h} style={{padding:"6px 12px",textAlign:h==="Item"?"left":"right",color:"#555",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>{o.products.map((p,i)=>(
                          <tr key={p.id} style={{background:i%2===0?"#111":"#0d0d0d",borderBottom:"1px solid #1a1a1a"}}>
                            <td style={{padding:"6px 12px",color:"#fff",fontWeight:"bold"}}>{p.name||"—"}</td>
                            <td style={{padding:"6px 12px",color:"#666",textAlign:"right",whiteSpace:"nowrap"}}>{p.qty||"—"}</td>
                            <td style={{padding:"6px 12px",color:"#666",textAlign:"right",whiteSpace:"nowrap"}}>{p.unitPrice?tk(parseFloat(p.unitPrice)):"—"}</td>
                            <td style={{padding:"6px 12px",color:"#fff",textAlign:"right",fontWeight:"bold",whiteSpace:"nowrap"}}>{tk(productTotal(p))}</td>
                          </tr>
                        ))}</tbody>
                        <tfoot>
                          {dc>0&&!o.deliveryPaid&&<tr style={{background:"#0d0d0d"}}><td colSpan={3} style={{padding:"6px 12px",color:"#555"}}>Delivery</td><td style={{padding:"6px 12px",color:"#888",textAlign:"right",whiteSpace:"nowrap"}}>{tk(dc)}</td></tr>}
                          <tr style={{background:"#cc0000"}}><td colSpan={3} style={{padding:"7px 12px",color:"#fff",fontWeight:"bold"}}>Total</td><td style={{padding:"7px 12px",color:"#fff",fontWeight:"bold",textAlign:"right",whiteSpace:"nowrap"}}>{tk(grand)}</td></tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── DEV VIEW ─────────────────────────────────────────────────────────────────
function DevView(){
  const url="https://damp-frost-0a6e.posterlagai.workers.dev";
  const[copied,setCopied]=React.useState(false);
  const[showAdmin,setShowAdmin]=React.useState(false);
  const[adminStep,setAdminStep]=React.useState(1); // 1=verify, 2=change
  const[adminPin,setAdminPin]=React.useState("");
  const[adminErr,setAdminErr]=React.useState("");
  const[changing,setChanging]=React.useState(null); // "owner" | "staff"
  const[step2Pin,setStep2Pin]=React.useState("");
  const[step2Confirm,setStep2Confirm]=React.useState("");
  const[step2Err,setStep2Err]=React.useState("");
  const[step2Ok,setStep2Ok]=React.useState("");

  const copy=()=>{navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};

  const verifyAdmin=()=>{
    const ownerPin=localStorage.getItem("pin_owner")||"4321";
    if(adminPin===ownerPin){setAdminStep(2);setAdminErr("");}
    else{setAdminErr("Wrong Owner PIN");setAdminPin("");}
  };

  const savePin=(role)=>{
    if(step2Pin.length!==4){setStep2Err("PIN must be 4 digits");return;}
    if(step2Pin!==step2Confirm){setStep2Err("PINs don't match");return;}
    localStorage.setItem(`pin_${role}`,step2Pin);
    setStep2Ok(`${role==="owner"?"Owner":"কেরানি"} PIN updated!`);
    setStep2Pin("");setStep2Confirm("");setStep2Err("");setChanging(null);
    setTimeout(()=>setStep2Ok(""),3000);
  };

  const resetAdmin=()=>{setShowAdmin(false);setAdminStep(1);setAdminPin("");setAdminErr("");setChanging(null);setStep2Pin("");setStep2Confirm("");setStep2Err("");setStep2Ok("");};

  return(
    <div style={{maxWidth:600,margin:"40px auto"}}>
      {/* Worker URL */}
      <div style={{fontWeight:"bold",fontSize:16,color:"#aaa",marginBottom:16}}>⚙ Cloudflare Worker URL</div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:24}}>
        <div style={{flex:1,background:"#111",border:"1px solid #222",borderRadius:8,padding:"12px 16px",fontSize:13,color:"#44cc44",fontFamily:"monospace",wordBreak:"break-all"}}>{url}</div>
        <button onClick={copy} style={{...bS(copied?"#0a2a0a":"#1a1a1a",copied?"#44cc44":"#aaa",13,copied?"#1a4a1a":"#333"),whiteSpace:"nowrap",minWidth:80}}>{copied?"✓ Copied":"Copy"}</button>
      </div>

      {/* Admin section */}
      {!showAdmin
        ?<button onClick={()=>setShowAdmin(true)} style={{...bS("#1a1a1a","#cc0000",13,"#cc0000"),width:"100%",padding:"12px"}}>🔐 Admin</button>
        :<div style={{background:"#111",border:"1px solid #222",borderRadius:10,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontWeight:"bold",color:"#cc0000",fontSize:14}}>🔐 Admin Panel</div>
            <button onClick={resetAdmin} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18}}>✕</button>
          </div>

          {/* Step 1 — verify owner PIN */}
          {adminStep===1&&(
            <div>
              <div style={{color:"#888",fontSize:13,marginBottom:12}}>Step 1 of 2 — Enter your Owner PIN to continue</div>
              <div style={{display:"flex",gap:8}}>
                <input type="password" maxLength={4} value={adminPin} onChange={e=>setAdminPin(e.target.value.replace(/\D/g,""))}
                  placeholder="Owner PIN" style={{...iS({flex:1}),letterSpacing:6,textAlign:"center",fontSize:18}}/>
                <button onClick={verifyAdmin} style={bS("#cc0000","#fff",13)}>Verify →</button>
              </div>
              {adminErr&&<div style={{color:"#ff4444",fontSize:12,marginTop:8}}>⚠ {adminErr}</div>}
            </div>
          )}

          {/* Step 2 — choose which PIN to change */}
          {adminStep===2&&(
            <div>
              <div style={{color:"#44cc44",fontSize:12,marginBottom:16}}>✓ Verified — Step 2 of 2</div>
              {step2Ok&&<div style={{color:"#44cc44",fontSize:13,marginBottom:12,background:"#0a2a0a",border:"1px solid #1a4a1a",borderRadius:6,padding:"8px 12px"}}>✅ {step2Ok}</div>}
              {!changing?(
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setChanging("owner")} style={{...bS("#1a1a1a","#cc0000",13,"#cc0000"),flex:1,padding:"12px"}}>Change Owner PIN</button>
                  <button onClick={()=>setChanging("staff")} style={{...bS("#1a1a1a","#cc0000",13,"#330000"),flex:1,padding:"12px"}}>Change Staff PIN</button>
                </div>
              ):(
                <div>
                  <div style={{color:"#aaa",fontSize:13,marginBottom:12}}>New {changing==="owner"?"Owner":"কেরানি"} PIN</div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <input type="password" maxLength={4} value={step2Pin} onChange={e=>setStep2Pin(e.target.value.replace(/\D/g,""))}
                      placeholder="New 4-digit PIN" style={{...iS(),letterSpacing:6,textAlign:"center",fontSize:18}}/>
                    <input type="password" maxLength={4} value={step2Confirm} onChange={e=>setStep2Confirm(e.target.value.replace(/\D/g,""))}
                      placeholder="Confirm PIN" style={{...iS(),letterSpacing:6,textAlign:"center",fontSize:18}}/>
                    {step2Err&&<div style={{color:"#ff4444",fontSize:12}}>⚠ {step2Err}</div>}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>setChanging(null)} style={{...bS("#1a1a1a","#666",13,"#333"),flex:1}}>← Back</button>
                      <button onClick={()=>savePin(changing)} style={{...bS("#cc0000","#fff",13),flex:1}}>Save PIN</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      }
    </div>
  );
}

// ── SHARED HELPERS ────────────────────────────────────────────────────────────
function NavBtn({label,active,onClick}){return<button onClick={onClick} style={{background:active?"#cc0000":"transparent",color:active?"#fff":"#666",border:`1px solid ${active?"#cc0000":"#333"}`,borderRadius:6,padding:"5px 14px",cursor:"pointer",fontWeight:"bold",fontSize:13}}>{label}</button>;}
function Info({label,value}){return<div><span style={{color:"#555",fontSize:11}}>{label}: </span><span style={{fontWeight:"bold",color:"#ccc"}}>{value}</span></div>;}
function Row({label,value}){return<div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:12,marginBottom:4,fontSize:13}}><span style={{color:"#666"}}>{label}</span>{value}</div>;}
function Field({label,children}){return<div style={{display:"flex",flexDirection:"column",gap:3}}><label style={{fontSize:11,fontWeight:"bold",color:"#555",textTransform:"uppercase",letterSpacing:0.5}}>{label}</label>{children}</div>;}
function Sec({title,children,action}){return<div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:12,marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontWeight:"bold",fontSize:13,color:"#888"}}>{title}</div>{action}</div>{children}</div>;}
function SCard({label,value,color}){return<div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px",textAlign:"center"}}><div style={{fontSize:11,color:"#444",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>{label}</div><div style={{fontSize:20,fontWeight:"bold",color}}>{value}</div></div>;}
function Modal({children,onClose}){return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:"#111",border:"1px solid #222",borderRadius:14,padding:22,maxWidth:700,width:"100%",maxHeight:"93vh",overflowY:"auto"}}>{children}</div></div>;}
function iS(extra={}){return{border:"1px solid #222",borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:"#0d0d0d",color:"#eee",width:"100%",boxSizing:"border-box",...extra};}
function bS(bg,color,fontSize=13,border){return{background:bg,color,border:`1px solid ${border||bg}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",fontWeight:"bold",fontSize};}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
